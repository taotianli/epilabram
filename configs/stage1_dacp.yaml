model:
  backbone_size: "base"
  pretrained_path: "checkpoints/labram-base.pth"
  patch_window: 200
  max_patches: 256
  hidden_size: 200
  num_heads: 10
  num_layers: 12
  mlp_ratio: 4

masking:
  base_mask_ratio: 0.3
  beta: 5.0
  alpha: 0.3
  use_symmetric_masking: true
  spectral_weight: 0.4
  line_length_weight: 0.4
  peak_weight: 0.2

curriculum:
  initial_weights: [0.6, 0.2, 0.1, 0.1]
  mid_weights: [0.3, 0.3, 0.2, 0.2]
  final_weights: [0.25, 0.25, 0.25, 0.25]
  stage1_end_epoch: 10
  stage2_end_epoch: 30

training:
  peak_lr: 5e-4
  min_lr: 1e-5
  weight_decay: 0.05
  warmup_epochs: 5
  total_epochs: 50
  batch_size: 64
  accumulation_steps: 8
  ema_decay: 0.996
  gradient_clip: 3.0

data:
  tuab_path: "data/tuh/tuab"
  tusz_path: "data/tuh/tusz"
  tuev_path: "data/tuh/tuev"
  tuep_path: "data/tuh/tuep"
  edf_path: "/home/taotl/Desktop/TUAR/v3.0.1/edf"
  num_workers: 0
  sample_rate: 200
  window_sec: 10.0
  stride_sec: 5.0
