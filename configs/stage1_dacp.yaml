model:
  backbone_size: "base"
  pretrained_path: "checkpoints/labram-base.pth"
  vqnsp_path: "checkpoints/vqnsp.pth"
  patch_window: 200
  max_patches: 256
  hidden_size: 200
  num_heads: 10
  num_layers: 12
  mlp_ratio: 4

masking:
  base_mask_ratio: 0.3
  beta: 5.0
  alpha: 0.3
  use_symmetric_masking: true
  spectral_weight: 0.4
  line_length_weight: 0.4
  peak_weight: 0.2

curriculum:
  initial_weights: [0.6, 0.2, 0.1, 0.1]
  mid_weights: [0.3, 0.3, 0.2, 0.2]
  final_weights: [0.25, 0.25, 0.25, 0.25]
  stage1_end_epoch: 10
  stage2_end_epoch: 30

training:
  peak_lr: 5e-4
  min_lr: 1e-5
  weight_decay: 0.05
  warmup_epochs: 5
  total_epochs: 50
  batch_size: 64
  accumulation_steps: 8
  ema_decay: 0.996
  gradient_clip: 3.0

data:
  # 集群路径：预处理后的 h5 数据目录
  tuab_path: "/projects/u6da/tuh_processed/tuab"
  tusz_path: "/projects/u6da/tuh_processed/tusz"
  tuev_path: "/projects/u6da/tuh_processed/tuev"
  tuep_path: "/projects/u6da/tuh_processed/tuep"
  # TUAR EDF 原始路径（Stage1 直接读取）
  edf_path: "/projects/u6da/tuh_eeg/tuar/edf"
  num_workers: 8
  sample_rate: 200
  window_sec: 10.0
  stride_sec: 5.0
